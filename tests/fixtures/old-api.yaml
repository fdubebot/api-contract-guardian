openapi: 3.0.3
info:
  title: Demo API
  version: 1.2.0
paths:
  /users:
    get:
      operationId: listUsers
      parameters:
        - in: query
          name: page
          required: false
          schema: { type: integer }
      responses:
        '200': { description: OK }
  /users/{id}:
    get:
      operationId: getUser
      responses:
        '200': { description: OK }
        '404': { description: Not found }
  /orders:
    post:
      operationId: createOrder
      requestBody:
        required: false
      responses:
        '201': { description: Created }
