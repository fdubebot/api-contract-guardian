openapi: 3.0.3
info:
  title: Demo API
  version: 2.0.0
paths:
  /users:
    get:
      operationId: listUsers
      parameters:
        - in: query
          name: page
          required: true
          schema: { type: integer }
      responses:
        '200': { description: OK }
  /orders:
    parameters:
      - in: header
        name: X-Tenant-Id
        required: true
        schema: { type: string }
    post:
      operationId: createOrder
      requestBody:
        required: true
      responses:
        '201': { description: Created }
  /health:
    get:
      operationId: health
      responses:
        '200': { description: OK }
